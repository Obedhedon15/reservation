server {
    # On ajoute default_server pour dire à Nginx que c'est CE fichier le patron
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;
    
    # Chemin vers ton projet Laravel dans le conteneur
    root /app/public;
    index index.php index.html;

    charset utf-8;

    # Gestion des routes Laravel
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Connexion avec PHP-FPM (via le socket Unix configuré dans ton Dockerfile)
    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    # Sécurité : interdire l'accès aux fichiers cachés
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Endpoint pour vérifier que le site est en ligne (Health check)
    location = /up {
        try_files $uri /index.php?$query_string;
    }

    # Mise en cache des fichiers statiques (images, css, js)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires max;
        log_not_found off;
        access_log off;
    }

    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}