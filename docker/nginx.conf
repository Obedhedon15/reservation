server {
    # On garde default_server pour que ce soit la config prioritaire
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;
    
    # Dossier public de ton projet Laravel
    root /app/public;
    index index.php index.html;

    charset utf-8;

    # Gestion des routes Laravel (essentiel pour que les liens fonctionnent)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # --- LA CORRECTION POUR LE 502 EST ICI ---
    location ~ \.php$ {
        # On remplace unix:/run/php/php8.2-fpm.sock par 127.0.0.1:9000
        fastcgi_pass 127.0.0.1:9000; 
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    # Sécurité : interdire l'accès aux fichiers cachés (.env, .git, etc.)
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Health check pour Railway
    location = /up {
        try_files $uri /index.php?$query_string;
    }

    # Optimisation pour les fichiers statiques
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires max;
        log_not_found off;
        access_log off;
    }

    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}